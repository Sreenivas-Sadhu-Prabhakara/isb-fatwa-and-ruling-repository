# Default values for isb-fatwa-and-ruling-repository (BIAN Service Domain: Fatwa And Ruling Repository)

image:
  repository: isb/isb-fatwa-and-ruling-repository
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Namespace is set per BIAN business area by deploy-all.sh (helm -n <ns>).
# These labels ride on every object for mesh policy + observability slicing.
isb:
  serviceDomain: "fatwa-and-ruling-repository"
  businessArea: "shariah-governance-and-compliance"
  businessDomain: "shariah-governance"
  functionalPattern: "catalog"

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

# Gateway API route (Cilium implements Gateway API natively — no ingress controller)
route:
  enabled: true
  gatewayName: isb-gateway
  gatewayNamespace: isb-system
  # External path prefix; rewritten to / before hitting the service
  pathPrefix: /isb-fatwa-and-ruling-repository

# CiliumNetworkPolicy — default-deny posture, explicit allows
networkPolicy:
  enabled: true
  monitoringNamespace: monitoring

# Runtime wiring (Phase 2d gates): activate Spring profiles / inject env.
#   springProfiles: "postgres,kafka"
#   extraEnv:
#     - { name: BIAN_DB_URL, value: "jdbc:postgresql://pg-<repo>:5432/<db>" }
springProfiles: ""
extraEnv: []
